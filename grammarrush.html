<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammar Rush - Spoken English</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f0f2f5 0%, #7fffd4 100%);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 { color: #1877F2; text-transform: uppercase; text-shadow: 2px 2px white; margin-bottom: 5px; }

    .game-box {
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      text-align: center;
      position: relative;
    }

    .timer-bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    #progress {
      width: 100%;
      height: 100%;
      background: #ff4757;
      transition: width 0.1s linear;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option-btn {
      background: #ffffff;
      border: 3px solid #1877F2;
      color: #1877F2;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s;
      box-shadow: 0 5px 0 #1877F2;
      text-align: center;
    }

    .option-btn:hover { background: #f0faff; }
    .option-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1877F2; }

    .score-area {
      margin-top: 25px;
      font-weight: 800;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-around;
    }

    #message {
      height: 30px;
      margin-top: 15px;
      font-weight: 700;
    }

    .start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .start-btn {
      background: #2ed573;
      color: white;
      padding: 20px 40px;
      border-radius: 20px;
      border: none;
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 0 #218c74;
    }

    .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #218c74; }

    select {
      padding: 8px;
      border-radius: 10px;
      border: 2px solid #1877F2;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

    let score = 0;

    let currentQuestion = {};
    let timer;
    let timeLeft = 100;
    let minRange = 0;
    let maxRange = 200;

    document.getElementById('highScore').innerText = highScore;

    function jumpToDifficulty() {
      const range = document.getElementById('difficultyJump').value.split('-');
      minRange = parseInt(range[0]);
      maxRange = parseInt(range[1]);
      
      startGame(); // Restarts the game in the new difficulty
    }

    function startGame() {
      score = 0;
      document.getElementById('score').innerText = score;
      document.getElementById('startOverlay').style.display = 'none';
      nextQuestion();
    }

    function nextQuestion() {
      clearInterval(timer);
      timeLeft = 100;
      document.getElementById('progress').style.width = '100%';
      document.getElementById('message').innerText = "";
      
      const randomIndex = Math.floor(Math.random() * (maxRange - minRange)) + minRange;
      currentQuestion = quizData[randomIndex];
      
      document.getElementById('question').innerText = `Topic: ${currentQuestion.q}`;
      
      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      
      currentQuestion.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(index);
        optionsDiv.appendChild(btn);
      });

      startTimer();
    }

    function startTimer() {
      timer = setInterval(() => {
        timeLeft -= 2;
        document.getElementById('progress').style.width = timeLeft + '%';
        if (timeLeft <= 0) {
          endGame("⏰ Out of Time!");
        }
      }, 100);
    }

    function checkAnswer(choice) {
      if (choice === currentQuestion.correct) {
        score++;
        document.getElementById('score').innerText = score;
        document.getElementById('message').innerText = "✅ Correct!";
        document.getElementById('message').style.color = "#2ed573";
        setTimeout(nextQuestion, 500);
      } else {
        endGame("❌ Wrong Choice!");
      }
    }

    function endGame(msg) {
      clearInterval(timer);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('grammarHighScore', highScore);
        document.getElementById('highScore').innerText = highScore;
      }
      document.getElementById('message').innerText = msg;
      document.getElementById('message').style.color = "#ff4757";
      document.getElementById('options').innerHTML = '';
      setTimeout(() => {
        document.getElementById('startOverlay').style.display = 'flex';
        document.getElementById('question').innerText = `Game Over! Final Score: ${score}`;
      }, 1500);
    }
