<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TESTIMONIALS BY STUDENTS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .testimonial-form, .testimonial-section {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      max-width: 800px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .testimonial-form input, .testimonial-form textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .testimonial-form button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    .testimonial-form button:hover {
      background: #218838;
    }
    .testimonial {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
    .testimonial img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-right: 20px;
      object-fit: cover;
    }
    .testimonial-content {
      flex-grow: 1;
    }
    .stars {
      color: gold;
    }
    .navigation-buttons {
      text-align: center;
      margin: 20px 0;
    }
    .arrow-button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .arrow-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>TESTIMONIALS BY STUDENTS</h1>

  <div class="testimonial-form">
    <h2>Submit Your Testimonial</h2>
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="email" id="email" placeholder="Email Address">
    <textarea id="message" rows="4" placeholder="Your message..."></textarea>
    <input type="file" id="photo" accept="image/jpeg, image/png, application/pdf">
    <label>Rate your trainer (1-5): </label>
    <input type="number" id="rating" min="1" max="5">
    <button onclick="submitTestimonial()">Submit</button>
  </div>

  <div class="testimonial-section" id="testimonialSection">
    <!-- Testimonials will be inserted here -->
  </div>

  <div class="navigation-buttons">
    <button class="arrow-button" onclick="previousPage()">&#8592;</button>
    <button class="arrow-button" onclick="nextPage()">&#8594;</button>
  </div>

  <script>
    let testimonials = [];
    let currentPage = 0;

    function renderTestimonials() {
      const container = document.getElementById('testimonialSection');
      container.innerHTML = '';
      const start = currentPage * 5;
      const end = start + 5;
      const pageTestimonials = testimonials.slice(start, end);

      for (const testimonial of pageTestimonials) {
        const div = document.createElement('div');
        div.className = 'testimonial';
        div.innerHTML = `
          <img src="${testimonial.photo}" alt="Photo">
          <div class="testimonial-content">
            <strong>${testimonial.name}</strong><br>
            <span class="stars">${'★'.repeat(testimonial.rating)}${'☆'.repeat(5 - testimonial.rating)}</span><br>
            <p>${testimonial.message}</p>
          </div>
        `;
        container.appendChild(div);
      }
    }

    function submitTestimonial() {
      const name = document.getElementById('fullName').value;
      const message = document.getElementById('message').value;
      const rating = parseInt(document.getElementById('rating').value) || 5;
      const photoInput = document.getElementById('photo');
      const file = photoInput.files[0];

      if (!file) {
        alert("Please upload a photograph.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        testimonials.unshift({
          name: name,
          message: message,
          rating: rating,
          photo: e.target.result
        });
        currentPage = 0;
        renderTestimonials();
      };
      reader.readAsDataURL(file);

      document.getElementById('fullName').value = '';
      document.getElementById('mobile').value = '';
      document.getElementById('email').value = '';
      document.getElementById('message').value = '';
      document.getElementById('rating').value = '';
      document.getElementById('photo').value = '';
    }

    function nextPage() {
      if ((currentPage + 1) * 5 < testimonials.length) {
        currentPage++;
        renderTestimonials();
      }
    }

    function previousPage() {
      if (currentPage > 0) {
        currentPage--;
        renderTestimonials();
      }
    }
  </script>
</body>
</html>
