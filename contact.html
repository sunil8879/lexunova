<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | LEXUNOVA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:gradient 15s ease infinite;
overflow:hidden;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:900px;
max-width:100%;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:60px;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
color:white;
text-align:center;
}

.logo{
font-size:4rem;
font-weight:800;
letter-spacing:2px;
margin-bottom:10px;
}

.tagline{
font-size:1.3rem;
margin-bottom:40px;
color:#fff9c4;
}

.contact-box{
background:rgba(255,255,255,.15);
padding:35px;
border-radius:20px;
margin-top:20px;
}

.contact-item{
font-size:1.2rem;
margin:20px 0;
line-height:2;
}

.label{
font-weight:700;
display:block;
font-size:1.1rem;
opacity:.9;
}

.value{
font-size:1.25rem;
}

.footer{
margin-top:40px;
font-size:1rem;
opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">LEXUNOVA</div>

<div class="tagline">
Excellence in Education & Communication
</div>

<div class="contact-box">

<h2>Contact Us</h2>

<br>

<div class="contact-item">
<span class="label">Address</span>
<span class="value">
YOUR OFFICE ADDRESS HERE
</span>
</div>

<div class="contact-item">
<span class="label">Mobile Number</span>
<span class="value">
+91 XXXXXXXXXX
</span>
</div>

<div class="contact-item">
<span class="label">Email Address</span>
<span class="value">
your@email.com
</span>
</div>

</div>

<div class="footer">
For enquiries, partnerships, training programs, and support, feel free to contact us using the details above.
</div>

</div>

</body>
</html>
