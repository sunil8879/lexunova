<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Dashboard - Google Classroom</title>
    <!-- Firebase App (Needed for user info, if you want to link Classroom connection to Firebase user) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <!-- Google API Client Library -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            color: #333333;
            margin: 0;
            min-height: 100vh; /* Ensure body takes full viewport height */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 36px;
            color: #333333;
            margin-bottom: 5px;
        }

        p { /* General paragraph style */
            font-size: 18px;
            color: #666666;
            margin-bottom: 20px; /* Default margin for general p tags */
        }
        
        .user-greeting {
            font-size: 20px;
            color: #444444;
            margin-bottom: 30px;
        }

        #classroom-status {
            font-size: 16px;
            font-style: italic;
            margin-bottom: 40px; /* Increased margin for status */
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .dashboard-button {
            background: linear-gradient(to bottom, #333333, #808080);
            color: white;
            padding: 0 30px; /* Padding horizontal only, height controls vertical */
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            box-shadow:
                inset 0 -3px 8px rgba(255, 255, 255, 0.4),
                0 6px 15px rgba(0, 0, 0, 0.6);
            width: 300px; /* Increased width slightly */
            height: 70px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: normal; /* Ensure text is centered well */
        }

        .dashboard-button:hover {
            box-shadow:
                inset 0 -3px 8px rgba(255, 255, 255, 0.6),
                0 8px 20px rgba(0, 0, 0, 0.8);
            transform: translateY(-2px);
        }
        .dashboard-button:disabled {
            background: #cccccc;
            color: #666666;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #courses-list-container {
            margin-top: 20px;
            text-align: left;
            width: 90%; /* Responsive width */
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        #courses-list-container h3 {
            text-align: center;
            margin-top: 0;
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
        }
        #courses-ul {
            list-style: none;
            padding: 0;
            max-height: 300px; /* Max height for scrollability */
            overflow-y: auto; /* Add scroll if content exceeds max-height */
        }
        #courses-ul li {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            color: #555;
            cursor: default;
        }
        #courses-ul li:last-child {
            border-bottom: none;
        }
        #courses-ul li:hover {
            background-color: #e9e9e9;
        }

        .full-width-logout {
          width: 100%;
          display: flex;
          justify-content: center;
          margin-top: 30px; /* Spacing for logout button */
          margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>LMS Dashboard</h1>
    <p class="user-greeting" id="user-greeting-message">Welcome!</p>
    <p id="classroom-status">Please connect to Google Classroom to view your courses.</p>

    <div class="button-container">
        <button id="authorize_button" class="dashboard-button">Connect to Google Classroom</button>
        <button id="signout_button" class="dashboard-button" style="display:none;">Disconnect Google Classroom</button>
    </div>
    <div class="full-width-logout">
      <button id="logout_firebase_button" class="dashboard-button" style="background: linear-gradient(to bottom, #ae2929, #611212); width: 240px;">Logout Application</button>
    </div>


    <div id="courses-list-container" style="display:none;">
        <h3>Your Google Classroom Courses</h3>
        <ul id="courses-ul"></ul>
    </div>

    <script>
        // IMPORTANT: REPLACE WITH YOUR ACTUAL FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDSIfqq4PfQLlMuWedEgL_2wPdnmbDw9aQ",
  authDomain: "health-plus-ce26a.firebaseapp.com",
  projectId: "health-plus-ce26a",
  storageBucket: "health-plus-ce26a.firebasestorage.app",
  messagingSenderId: "924721243511",
  appId: "1:924721243511:web:a7cf539c25d2dcc57cad72"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // --- Google API Client Configuration ---
        // IMPORTANT: REPLACE WITH YOUR ACTUAL GOOGLE API CREDENTIALS
        const API_KEY = 'AIzaSyAAJFDgr6-p9PzS22AcuJTC9twOgwxdJBc';         // REPLACE THIS
        const CLIENT_ID = '924721243511-67b5b592j50k1c97dc4gellu5tnmpblk.apps.googleusercontent.com';     // REPLACE THIS (e.g., xxxxx.apps.googleusercontent.com)

        // Scopes define the permissions you are requesting from the user.
        const SCOPES = 'https://www.googleapis.com/auth/classroom.courses.readonly https://www.googleapis.com/auth/classroom.rosters.readonly';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        const authorizeButton = document.getElementById('authorize_button');
        const signoutButton = document.getElementById('signout_button');
        const coursesListContainer = document.getElementById('courses-list-container');
        const coursesUl = document.getElementById('courses-ul');
        const classroomStatusP = document.getElementById('classroom-status');
        const userGreetingP = document.getElementById('user-greeting-message');

        authorizeButton.style.visibility = 'hidden';
        signoutButton.style.visibility = 'hidden';

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            try {
                await gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: ['https://classroom.googleapis.com/$discovery/rest?version=v1'],
                });
                gapiInited = true;
                console.log("GAPI client initialized.");
                maybeEnableButtonsAndCheckToken();
            } catch (error) {
                console.error("Error initializing GAPI client:", error);
                classroomStatusP.textContent = "Error initializing Google API. Please check console.";
            }
        }

        function gisLoaded() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: gisTokenResponseCallback, // This callback is triggered after token response
                });
                gisInited = true;
                console.log("GIS client initialized.");
                maybeEnableButtonsAndCheckToken();
            } catch (error) {
                console.error("Error initializing GIS client:", error);
                classroomStatusP.textContent = "Error initializing Google Sign-In. Please check console.";
            }
        }
        
        function maybeEnableButtonsAndCheckToken() {
            if (gapiInited && gisInited) {
                authorizeButton.style.visibility = 'visible';
                // Attempt to use existing token if available (e.g., user reloads page after authorizing)
                const currentToken = gapi.client.getToken();
                if (currentToken && currentToken.access_token) {
                    console.log("Found existing Google token. Attempting to list courses.");
                    handleSuccessfulGoogleAuth();
                } else {
                    console.log("No existing Google token found.");
                }
            }
        }
        
        async function gisTokenResponseCallback(resp) {
            if (resp.error) {
                console.error("Google Auth Error from GIS callback:", resp);
                classroomStatusP.textContent = `Google Connection Error: ${resp.error_description || resp.error}. Please try again.`;
                // Optionally reset UI if auth failed
                authorizeButton.style.display = 'flex';
                signoutButton.style.display = 'none';
                coursesListContainer.style.display = 'none';
                return;
            }
            // GIS Oauth2 library stores the access token. GAPI will use it automatically.
            console.log("GIS token response successful.");
            handleSuccessfulGoogleAuth();
        }

        function handleSuccessfulGoogleAuth() {
            classroomStatusP.textContent = "Successfully connected to Google Classroom! Fetching courses...";
            authorizeButton.style.display = 'none';
            signoutButton.style.display = 'flex';
            listCourses();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                const userName = localStorage.getItem("userName") || user.email;
                userGreetingP.textContent = `Welcome, ${userName}!`;
                console.log("Firebase user authenticated:", userName);
            } else {
                console.log("No Firebase user. Redirecting to login.");
                window.location.href = 'loginlast.html';
            }
        });

        authorizeButton.onclick = function() {
            if (!gapiInited || !gisInited) {
                alert("Google API not fully loaded yet. Please wait a moment and try again.");
                return;
            }
            console.log("Authorize button clicked. Requesting access token...");
            // Prompt the user to select a Google Account and ask for consent to share their data
            // when establishing a new session or if the token is missing/expired.
            tokenClient.requestAccessToken({prompt: 'consent'});
        };

        signoutButton.onclick = function() {
            const token = gapi.client.getToken();
            if (token !== null && token.access_token) {
                google.accounts.oauth2.revoke(token.access_token, () => {
                    gapi.client.setToken(''); // Clear gapi token
                    console.log("Google token revoked and cleared.");
                    classroomStatusP.textContent = 'Disconnected from Google Classroom. Connect again to see courses.';
                    coursesListContainer.style.display = 'none';
                    coursesUl.innerHTML = '';
                    authorizeButton.style.display = 'flex';
                    signoutButton.style.display = 'none';
                });
            } else {
                 // If no token, just update UI
                console.log("No Google token to revoke, just updating UI for sign out.");
                classroomStatusP.textContent = 'Disconnected from Google Classroom. Connect again to see courses.';
                coursesListContainer.style.display = 'none';
                coursesUl.innerHTML = '';
                authorizeButton.style.display = 'flex';
                signoutButton.style.display = 'none';
            }
        };

        async function listCourses() {
            if (!gapi.client.getToken() || !gapi.client.getToken().access_token) {
                classroomStatusP.textContent = "Google connection lost or token expired. Please connect again.";
                coursesListContainer.style.display = 'none';
                authorizeButton.style.display = 'flex';
                signoutButton.style.display = 'none';
                return;
            }

            coursesListContainer.style.display = 'block';
            coursesUl.innerHTML = '<li><em>Loading your courses...</em></li>';
            try {
                const response = await gapi.client.classroom.courses.list({
                    // You can add teacherId: "me" or studentId: "me" to filter
                    // courseStates: ['ACTIVE'] // To get only active courses
                });
                console.log("Classroom API response:", response);
                
                const courses = response.result.courses;
                if (courses && courses.length > 0) {
                    coursesUl.innerHTML = '';
                    courses.forEach(course => {
                        const listItem = document.createElement('li');
                        listItem.textContent = `${course.name} (Status: ${course.courseState})`;
                        // You could add course.alternateLink to make it clickable
                        coursesUl.appendChild(listItem);
                    });
                    classroomStatusP.textContent = `Displaying ${courses.length} Google Classroom course(s).`;
                } else {
                    coursesUl.innerHTML = '<li>No courses found or you are not enrolled in any.</li>';
                    classroomStatusP.textContent = 'No Google Classroom courses found.';
                }
            } catch (err) {
                console.error("Error listing courses:", err);
                let errorMessage = "Could not fetch courses.";
                if (err.result && err.result.error) {
                    errorMessage = `Error: ${err.result.error.message} (Code: ${err.result.error.code})`;
                    if (err.result.error.code === 401 || err.result.error.code === 403) {
                        // Unauthorized or token expired, prompt for re-auth
                        classroomStatusP.textContent = "Session expired or permission issue. Please reconnect Google Classroom.";
                        handleSignoutClick(); // Effectively signs out and shows connect button
                    }
                } else if (err.message) {
                    errorMessage = err.message;
                }
                coursesUl.innerHTML = `<li>${errorMessage}</li>`;
            }
        }
        
        document.getElementById('logout_firebase_button').addEventListener('click', () => {
            auth.signOut().then(() => {
                localStorage.removeItem("userName");
                console.log("Firebase user signed out.");
                // Optional: Also sign out from Google if the user is connected
                if (gapi.client.getToken() && gapi.client.getToken().access_token) {
                    handleSignoutClick(); // This will clear the Google token and update UI
                }
                window.location.href = 'loginlast.html';
            }).catch((error) => {
                console.error("Firebase logout error:", error);
                alert("Error logging out from Firebase.");
            });
        });

    </script>
</body>
</html>
