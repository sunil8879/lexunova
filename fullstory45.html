  <h1>The Dragon’s Egg</h1>
  <p>A gleaming dragon’s egg was found in the mountains by the brave Elara.
The egg began to crack and soon hatched a fierce dragon who could breathe lightning.
Together, they protected the kingdom from invaders and became legends.</p>
