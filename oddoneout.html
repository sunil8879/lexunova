      padding: 15px;

      border: 2px solid #7fffd4;
    }

      border: 2px solid #1877F2;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    .word-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

      background: #ffffff;
      border: 3px solid #1877F2;
      color: #1877F2;
      padding: 20px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.1rem;
      transition: all 0.1s;
      box-shadow: 0 6px 0 #1877F2;
      text-transform: capitalize;
    }

    .word-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1877F2; }

      margin-top: 30px;
      font-weight: 800;
      color: #333;
      font-size: 1.1rem;
    }

      margin-top: 15px;
      font-weight: 700;
      height: 30px;
      font-size: 1.2rem;
    }

      font-size: 0.95rem;
      color: #444;
      margin-top: 10px;
      font-style: italic;
      background: #e6fff9;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      color: white;
      padding: 12px 25px;
      border-radius: 15px;
      border: none;
      font-size: 1rem;
      font-weight: 800;

      <select id="diffJump">

        <option value="50">Hard (51-100)</option>
        <option value="100">Harder (101-150)</option>
        <option value="150">Hardest (151-200)</option>

    <div class="explanation" id="explanation"></div>

    <div class="word-grid" id="wordGrid"></div>

    <div class="score-board">

  </div>

    let level = 0;
    const wordGrid = document.getElementById('wordGrid');
    const msg = document.getElementById('message');
    const explanation = document.getElementById('explanation');
    const levelText = document.getElementById('currentLevel');

    function startGame() {
      document.getElementById('startOverlay').style.display = 'none';
      loadLevel();
    }

    function jumpTo() {
      level = parseInt(document.getElementById('diffJump').value);
      loadLevel();
    }

    function loadLevel() {
      const data = gameData[level];
      wordGrid.innerHTML = '';
      msg.innerText = '';
      explanation.innerText = '';
      explanation.style.display = 'none';
      levelText.innerText = level + 1;

      data.words.forEach((w, i) => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.innerText = w;
        btn.onclick = () => check(i);
        wordGrid.appendChild(btn);
      });
    }

    function check(index) {
      const data = gameData[level];
      if (index === data.odd) {
        msg.innerText = "✅ Correct!";
        msg.style.color = "#2ed573";
        explanation.innerText = data.why;
        explanation.style.display = 'block';
        
        // Brief delay before next level
        setTimeout(() => {
          level++;
          if (level < gameData.length) {
            loadLevel();
          } else {
            msg.innerText = "🏆 Final Level Completed!";
            wordGrid.innerHTML = '';
          }
        }, 3000);
      } else {
        msg.innerText = "❌ Try Again!";
        msg.style.color = "#ff4757";
        explanation.style.display = 'none';
      }
    }
  </script>
