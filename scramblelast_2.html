      border: 1px solid #aaa;

      width: 300px;
      margin: 0 auto 20px;
    }

      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    .result, .score, .timer {
      margin-top: 10px;
      font-size: 20px;
    }

    .score {
      color: green;
    }

    .timer {

    let currentIndex = 0;
    let wordHistory = [];
    let score = 0;
    let timer;
    let timeLeft = 30;

    function scramble(word) {
      return word.split('').sort(() => 0.5 - Math.random()).join('');
    }

    function loadWord(index) {
      if (!wordHistory[index]) {
        const word = wordList[Math.floor(Math.random() * wordList.length)];
        wordHistory[index] = {
          correct: word,
          scrambled: scramble(word)
        };
      }

      document.getElementById("scrambledWord").textContent = wordHistory[index].scrambled;
      document.getElementById("userGuess").value = "";
      document.getElementById("result").textContent = "";
      document.getElementById("timer").textContent = "Time left: 30s";
      startTimer();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = 30;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").textContent = "Time left: " + timeLeft + "s";
        if (timeLeft === 0) {
          clearInterval(timer);
          document.getElementById("result").textContent = `Time's up! The correct word was "${wordHistory[currentIndex].correct}".`;
        }
      }, 1000);
    }

    function checkAnswer() {
      const guess = document.getElementById("userGuess").value.trim().toLowerCase();
      const correct = wordHistory[currentIndex].correct;
      const result = document.getElementById("result");

      if (guess === correct) {
        result.textContent = "Correct!";
        if (!wordHistory[currentIndex].answered) {
          score++;
          document.getElementById("score").textContent = "Score: " + score;
          wordHistory[currentIndex].answered = true;
        }
      } else {
        result.textContent = `Incorrect. The correct word was "${correct}".`;
      }

      clearInterval(timer);
    }

    function nextWord() {
      currentIndex++;
      loadWord(currentIndex);
    }

    function prevWord() {
      if (currentIndex > 0) {
        currentIndex--;
        loadWord(currentIndex);
      }
    }

    // Load the first word
    loadWord(currentIndex);
