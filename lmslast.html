<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LMS Dashboard</title>
  <style>
    body {
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      margin: 0;
      overflow-x: hidden;
    }

    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    h1 {
      font-size: 36px;
      color: #333333;
      margin-bottom: 5px;
    }

    p {
      font-size: 18px;
      color: #666666;
      margin-bottom: 60px;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .row-gap {
      margin-bottom: 40px;
    }

    .dashboard-button {
      background: linear-gradient(to bottom, #333333, #808080);
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      box-shadow:
        inset 0 -3px 8px rgba(255, 255, 255, 0.4),
        0 6px 15px rgba(0, 0, 0, 0.6);
      width: 240px;
      height: 70px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
    }

    .dashboard-button:hover {
      box-shadow:
        inset 0 -3px 8px rgba(255, 255, 255, 0.6),
        0 8px 20px rgba(0, 0, 0, 0.8);
      transform: translateY(-2px);
    }

    .full-width {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.85);
      padding: 20px;
      border-radius: 12px;
      display: inline-block;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
    }

    .hidden {
      display: none;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    #welcome {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .top-buttons {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <!-- Background video -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="media/background.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="container">
    <div id="welcome"></div>

    <div class="top-buttons">
      <button id="logout-button" class="dashboard-button">Logout</button>
    </div>

    <h1>LMS Dashboard</h1>

    <button id="dashboard-button" class="dashboard-button">Go to Google Classroom</button>
    <div id="message" class="message hidden"></div>
  </div>

  <script>
    // Display welcome message
    const studentName = localStorage.getItem("userName");
    const welcome = document.getElementById("welcome");
    if (studentName) {
      welcome.textContent = "Welcome " + studentName;
    }

    // Logout logic
    document.getElementById("logout-button").addEventListener("click", () => {
      const name = localStorage.getItem("userName") || "student";
      alert("Bye Bye " + name);
      localStorage.removeItem("userName");
      window.location.href = "loginlast.html";
    });

    const API_KEY = 'AIzaSyAAJFDgr6-p9PzS22AcuJTC9twOgwxdJBc';
    const CLIENT_SECRET = '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';
    const REDIRECT_URL = 'https://classroom.google.com';

    function authenticateGoogleAPI() {
      return new Promise((resolve, reject) => {
        if (API_KEY && CLIENT_SECRET) {
          resolve("Authentication successful!");
        } else {
          reject("Authentication failed. Please check API keys.");
        }
      });
    }

    document.getElementById('dashboard-button').addEventListener('click', () => {
      const messageElement = document.getElementById('message');
      messageElement.classList.add('hidden');

      authenticateGoogleAPI()
        .then((message) => {
          messageElement.classList.remove('hidden');
          messageElement.classList.add('success');
          messageElement.textContent = message;

          setTimeout(() => {
            window.location.href = REDIRECT_URL;
          }, 2000);
        })
        .catch((error) => {
          messageElement.classList.remove('hidden');
          messageElement.classList.add('error');
          messageElement.textContent = error;
        });
    });
  </script>

</body>
</html>
