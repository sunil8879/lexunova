<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
<link rel="manifest" href="/manifest.json">
<style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    /* ✅ NEW STYLES FOR THE OVERLAY */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent black */
      z-index: 2; /* Sits on top of the video */
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .overlay-text {
      color: white;
      font-family: 'Poppins', sans-serif; /* Or any font you are using */
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <video id="introVideo" autoplay muted>
    <source src="media/glasslast.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

!-- ✅ ADD THIS OVERLAY DIV -->
  <div id="overlay">
    <div class="overlay-text">TAP TO BEGIN</div>
  </div>

<script>
    const video = document.getElementById("introVideo");
    const overlay = document.getElementById("overlay");

    // This function will be called when the user clicks the overlay
    function playWithSound() {
      // Try to play the video (this is needed for some browsers)
      video.play();
      // Unmute the video
      video.muted = false;
      // Hide the overlay
      overlay.style.display = 'none';
    }

    // Listen for a click on the overlay
    overlay.addEventListener('click', playWithSound);

    // This part remains the same: when the video ends, go to the next page
    video.onended = function() {
      window.location.href = "dashboardlast.html";
    };
  </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw-workbox.js');
    });
  }
</script>
</body>
</html>
