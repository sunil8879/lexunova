  <h1>The Invisible Cloak</h1>
  <pLucy found an enchanted cloak that made her vanish invisible whenever she wore it.
She used the cloak to sneak into the castle and overhear guards.
The cloak helped her solve the mystery of the sneaky thief and bring them to justice.</p>
