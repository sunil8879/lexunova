<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      background: linear-gradient(135deg, #f0f2f5 0%, #7fffd4 100%);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      color: #1877F2;
      text-transform: uppercase;
      text-shadow: 2px 2px white;
      margin-bottom: 10px;
    }

    .game-container {
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .instruction {
      color: #666;
      margin-bottom: 20px;
    }

    .sentence-display {
      min-height: 60px;
      border: 3px dashed #1877F2;
      border-radius: 15px;
      margin-bottom: 20px;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      background: #f9ffff;
    }

    .word-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .word-btn {
      background: #ffffff;
      border: 2px solid #1877F2;
      color: #1877F2;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #1877F2;
    }

    .word-btn:hover { background: #7fffd4; transform: translateY(-2px); }
    .word-btn:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    .word-btn.used { opacity: 0; pointer-events: none; }

    .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

    .action-btn {
      padding: 12px 25px;
      border-radius: 15px;
      border: none;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 5px 0 #333;
      transition: 0.1s;
    }

    .check-btn { background: #1877F2; color: white; box-shadow: 0 5px 0 #0d5bb5; }
    .reset-btn { background: #ff4757; color: white; box-shadow: 0 5px 0 #c0392b; }
    .next-btn { background: #2ed573; color: white; box-shadow: 0 5px 0 #218c74; display: none; }

    .goto-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid #1877F2;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    #message { margin-top: 20px; font-weight: 700; font-size: 1.2rem; height: 30px; }
    .score-board { margin-top: 20px; color: #1877F2; font-weight: bold; }
  </style>
</head>
<body>

  <h1>🔗 Sentence Builder</h1>
  <p class="instruction">Click the words in the correct order to make a sentence!</p>

  <div class="game-container">
    <!-- NEW GOTO SECTION -->
    <div class="goto-container">
      <select id="difficultySelect">
        <option value="0">Simple (1-50)</option>
        <option value="50">Hard (51-100)</option>
        <option value="100">Harder (101-125)</option>
        <option value="125">Hardest (126-150)</option>
      </select>
      <button class="action-btn check-btn" style="padding: 8px 15px; font-size: 0.8rem; box-shadow: 0 3px 0 #0d5bb5;" onclick="jumpToLevel()">GO TO</button>
    </div>

    <div class="sentence-display" id="sentenceDisplay"></div>
    <div class="word-pool" id="wordPool"></div>

    <div class="controls">
      <button class="action-btn reset-btn" onclick="resetSentence()">Reset</button>
      <button class="action-btn check-btn" id="checkBtn" onclick="checkAnswer()">Check Answer</button>
      <button class="action-btn next-btn" id="nextBtn" onclick="nextLevel()">Next Level</button>
    </div>

    <div id="message"></div>
    <!-- FIXED SCORE BOARD -->
    <div class="score-board">Level: <span id="levelDisplay">1</span> / 150</div>
  </div>

    let currentLevel = 0;
    let userSentence = [];

    const sentenceDisplay = document.getElementById('sentenceDisplay');
    const wordPool = document.getElementById('wordPool');
    const message = document.getElementById('message');
    const levelDisplay = document.getElementById('levelDisplay');

    // JUMP LOGIC
    function jumpToLevel() {
      const select = document.getElementById('difficultySelect');
      currentLevel = parseInt(select.value);
      initGame();
    }

    function initGame() {
      userSentence = [];
      sentenceDisplay.innerHTML = '';
      wordPool.innerHTML = '';
      message.innerHTML = '';
      message.style.color = 'black';
      document.getElementById('checkBtn').style.display = 'inline-block';
      document.getElementById('nextBtn').style.display = 'none';
      levelDisplay.innerText = currentLevel + 1;

      levels[currentLevel].jumbled.forEach((word, index) => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.innerText = word;
        btn.id = 'word-' + index;
        btn.onclick = () => addWord(word, 'word-' + index);
        wordPool.appendChild(btn);
      });
    }

    function addWord(word, btnId) {
      userSentence.push(word);
      const btn = document.getElementById(btnId);
      btn.classList.add('used');

      const span = document.createElement('button');
      span.className = 'word-btn';
      span.style.boxShadow = 'none';
      span.innerText = word;
      span.onclick = () => removeWord(word, btnId, span);
      sentenceDisplay.appendChild(span);
    }

    function removeWord(word, btnId, spanElement) {
      const index = userSentence.indexOf(word);
      if (index > -1) userSentence.splice(index, 1);
      document.getElementById(btnId).classList.remove('used');
      spanElement.remove();
    }

    function resetSentence() {
      initGame();
    }

    function checkAnswer() {
      const finalResult = userSentence.join(' ');
      if (finalResult === levels[currentLevel].correct) {
        message.innerText = "🎉 Excellent! Correct sentence.";
        message.style.color = "#2ed573";
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
      } else {
        message.innerText = "❌ Try again. Check the word order.";
        message.style.color = "#ff4757";
      }
    }

    function nextLevel() {
      currentLevel++;
      if (currentLevel < levels.length) {
        initGame();
      } else {
        message.innerText = "🏆 You built all the sentences!";
        document.getElementById('nextBtn').style.display = 'none';
      }
    }

    initGame();
  </script>
</body>
</html>
